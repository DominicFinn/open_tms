version: "3.9"
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tms
      POSTGRES_PASSWORD: tms
      POSTGRES_DB: tms
    ports:
      - "55432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgres://tms:tms@db:5432/tms
      NODE_ENV: development
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: open-tms
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_REGION: us-east-1
      S3_FORCE_PATH_STYLE: "true"
    depends_on:
      - db
      - minio
    ports:
      - "3001:3001"
  frontend:
    build: ./frontend
    env_file:
      - ./frontend/.env
    environment:
      VITE_API_URL: http://localhost:3001
    depends_on:
      - backend
    ports:
      - "8080:80"
  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
  edi-collector:
    build: ./edi-collector
    environment:
      BACKEND_URL: http://backend:3001
      API_KEY: ${EDI_COLLECTOR_API_KEY:-changeme}
      POLL_CONFIG_INTERVAL: "300"
      LOG_LEVEL: info
    depends_on:
      - backend
    restart: unless-stopped

  # Event & integration worker — runs in a SEPARATE container from the API
  # See docs/EVENT_ARCHITECTURE_PLAN.md for full details
  worker:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgres://tms:tms@db:5432/tms?connection_limit=5
      NODE_ENV: production
      WORKER_MODE: all           # "all" | "events" | "integrations"
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: open-tms
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_REGION: us-east-1
      S3_FORCE_PATH_STYLE: "true"
    command: ["node", "dist/worker.js"]
    depends_on:
      - db
      - minio
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
volumes:
  db-data:
  minio-data:
