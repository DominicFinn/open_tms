<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>How a TMS Works - Open TMS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --p50:#eff6ff; --p100:#dbeafe; --p200:#bfdbfe; --p300:#93c5fd;
    --p400:#60a5fa; --p500:#3b82f6; --p600:#2563eb; --p700:#1d4ed8;
    --p800:#1e40af; --p900:#1e3a8a; --p950:#172554;
    --a400:#a78bfa; --a500:#8b5cf6; --a600:#7c3aed;
    --s50:#f8fafc; --s100:#f1f5f9; --s200:#e2e8f0; --s300:#cbd5e1;
    --s400:#94a3b8; --s500:#64748b; --s600:#475569; --s700:#334155;
    --s800:#1e293b; --s900:#0f172a; --s950:#020617;
    --green:#22c55e; --yellow:#eab308; --red:#ef4444; --cyan:#06b6d4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    color: #fff;
    background: var(--s950);
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: linear-gradient(135deg, var(--s950) 0%, var(--p950) 50%, var(--s900) 100%);
    z-index: -2;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    opacity: 0.03;
    z-index: -1;
    pointer-events: none;
  }

  .deck { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
  .slide {
    position: absolute; inset: 0;
    padding: 64px 80px;
    display: none;
    flex-direction: column;
    opacity: 0;
    transition: opacity .4s ease;
    overflow: hidden;
  }
  .slide.active { display: flex; opacity: 1; }

  /* Radial glow decorations */
  .glow-orb {
    position: absolute;
    width: 700px; height: 700px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
    filter: blur(120px);
  }
  .glow-orb.p { background: rgba(37, 99, 235, 0.15); }
  .glow-orb.a { background: rgba(139, 92, 246, 0.12); }

  .content { position: relative; z-index: 1; display: flex; flex-direction: column; height: 100%; }

  /* Typography */
  .pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 16px;
    border-radius: 999px;
    border: 1px solid rgba(59, 130, 246, 0.2);
    background: rgba(59, 130, 246, 0.1);
    font-size: 13px;
    font-weight: 500;
    color: var(--p300);
    letter-spacing: 0.02em;
    width: fit-content;
  }
  .pill.accent {
    border-color: rgba(139, 92, 246, 0.22);
    background: rgba(139, 92, 246, 0.1);
    color: var(--a400);
  }
  .pill .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }

  h1.title { font-size: 76px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.02; margin: 24px 0 16px; }
  h1.title.small { font-size: 56px; }
  h2.section { font-size: 52px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.08; margin: 20px 0 12px; }
  .subtitle { font-size: 22px; color: var(--s300); line-height: 1.55; max-width: 960px; font-weight: 400; }
  .subtitle.lg { font-size: 26px; max-width: 1080px; }
  .gradient-text {
    background: linear-gradient(135deg, var(--p500), var(--a500));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
  }
  .eyebrow {
    text-transform: uppercase;
    letter-spacing: 0.15em;
    font-size: 12px;
    font-weight: 600;
    color: var(--p400);
  }

  /* Glass cards */
  .glass {
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 28px;
  }
  .glass.hl {
    background: linear-gradient(135deg, rgba(37,99,235,0.10), rgba(139,92,246,0.10));
    border-color: rgba(59,130,246,0.22);
  }
  .glass.sm { padding: 20px; border-radius: 16px; }

  /* Layout grids */
  .row { display: flex; gap: 24px; }
  .grid { display: grid; gap: 20px; }
  .g2 { grid-template-columns: repeat(2, 1fr); }
  .g3 { grid-template-columns: repeat(3, 1fr); }
  .g4 { grid-template-columns: repeat(4, 1fr); }
  .g5 { grid-template-columns: repeat(5, 1fr); }
  .spacer { flex: 1; }

  /* Card styles */
  .card-title { font-size: 17px; font-weight: 700; color: #fff; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
  .card-body { font-size: 13.5px; color: var(--s300); line-height: 1.55; }
  .card-icon {
    width: 44px; height: 44px;
    border-radius: 12px;
    background: rgba(37,99,235,0.18);
    color: var(--p400);
    display: inline-flex; align-items: center; justify-content: center;
    margin-bottom: 14px;
  }
  .card-icon.a { background: rgba(139,92,246,0.18); color: var(--a400); }
  .card-icon.g { background: rgba(34,197,94,0.18); color: var(--green); }
  .card-icon.y { background: rgba(234,179,8,0.18); color: var(--yellow); }
  .card-icon.r { background: rgba(239,68,68,0.18); color: var(--red); }
  .card-icon.c { background: rgba(6,182,212,0.18); color: var(--cyan); }
  .card-icon svg { width: 24px; height: 24px; }

  /* Stats */
  .stat-num { font-size: 44px; font-weight: 800; letter-spacing: -0.02em; line-height: 1; }
  .stat-label { font-size: 13px; color: var(--s400); margin-top: 6px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; }

  /* Actor avatar */
  .avatar {
    width: 56px; height: 56px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 18px;
    flex-shrink: 0;
  }

  /* Lifecycle flow */
  .flow { display: flex; gap: 10px; align-items: stretch; overflow: hidden; }
  .flow-step {
    flex: 1;
    padding: 20px 16px;
    border-radius: 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    display: flex; flex-direction: column; gap: 8px;
    position: relative;
  }
  .flow-step .step-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--p400);
    font-weight: 600;
    letter-spacing: 0.1em;
  }
  .flow-step .step-title { font-size: 14px; font-weight: 600; color: #fff; line-height: 1.3; }
  .flow-step .step-desc { font-size: 11.5px; color: var(--s400); line-height: 1.45; }
  .flow-step::after {
    content: '';
    position: absolute;
    right: -7px; top: 50%;
    width: 14px; height: 14px;
    border-right: 2px solid rgba(255,255,255,0.14);
    border-top: 2px solid rgba(255,255,255,0.14);
    transform: translateY(-50%) rotate(45deg);
    z-index: 2;
  }
  .flow-step:last-child::after { display: none; }

  /* Code / terminal block */
  .terminal {
    border-radius: 14px;
    background: var(--s900);
    border: 1px solid rgba(255,255,255,0.06);
    overflow: hidden;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
  }
  .terminal-bar {
    display: flex; align-items: center; gap: 6px;
    padding: 10px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    background: var(--s900);
  }
  .tb-dot { width: 10px; height: 10px; border-radius: 50%; }
  .tb-dot.r { background: rgba(239,68,68,0.6); }
  .tb-dot.y { background: rgba(234,179,8,0.6); }
  .tb-dot.g { background: rgba(34,197,94,0.6); }
  .terminal-title { margin-left: 10px; font-size: 11px; color: var(--s500); }
  .terminal-body { padding: 20px; color: var(--s300); line-height: 1.7; }
  .c-key { color: var(--p400); }
  .c-str { color: #6ee7b7; }
  .c-num { color: var(--a400); }
  .c-com { color: var(--s500); }

  /* Chips */
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11.5px;
    font-weight: 500;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.02em;
  }
  .chip.p { background: rgba(37,99,235,0.15); color: var(--p300); border: 1px solid rgba(37,99,235,0.25); }
  .chip.a { background: rgba(139,92,246,0.15); color: var(--a400); border: 1px solid rgba(139,92,246,0.25); }
  .chip.g { background: rgba(34,197,94,0.15); color: #86efac; border: 1px solid rgba(34,197,94,0.25); }
  .chip.y { background: rgba(234,179,8,0.15); color: #fde047; border: 1px solid rgba(234,179,8,0.25); }
  .chip.r { background: rgba(239,68,68,0.15); color: #fca5a5; border: 1px solid rgba(239,68,68,0.25); }

  /* Progress / nav */
  .nav {
    position: fixed;
    bottom: 24px; left: 0; right: 0;
    display: flex; align-items: center; justify-content: center;
    gap: 12px;
    z-index: 100;
  }
  .nav-btn {
    width: 38px; height: 38px;
    border-radius: 10px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: #fff;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.12); }
  .nav-count {
    font-size: 13px; font-family: 'JetBrains Mono', monospace;
    color: var(--s400);
    min-width: 60px;
    text-align: center;
    font-weight: 500;
  }
  .progress {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: rgba(255,255,255,0.05);
    z-index: 100;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--p500), var(--a500));
    transition: width .4s ease;
  }

  .logo-badge {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 8px 16px;
    border-radius: 12px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .logo-badge .truck {
    color: var(--p400);
  }

  .footnote {
    position: absolute;
    bottom: 24px; left: 80px;
    font-size: 12px;
    color: var(--s500);
    font-weight: 500;
  }

  /* Hero slide specific */
  .hero-grid {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 40px;
    align-items: center;
    flex: 1;
  }
  .hero-panel {
    border-radius: 20px;
    padding: 28px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
  }

  /* Diagram */
  .node {
    padding: 14px 18px;
    border-radius: 12px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    font-size: 13px;
    font-weight: 600;
    text-align: center;
  }
  .node.p { background: rgba(37,99,235,0.14); border-color: rgba(37,99,235,0.3); color: var(--p300); }
  .node.a { background: rgba(139,92,246,0.14); border-color: rgba(139,92,246,0.3); color: var(--a400); }
  .node.g { background: rgba(34,197,94,0.14); border-color: rgba(34,197,94,0.3); color: #86efac; }

  ul.clean { list-style: none; padding: 0; }
  ul.clean li { padding: 8px 0; padding-left: 22px; position: relative; color: var(--s300); font-size: 15px; line-height: 1.45; }
  ul.clean li::before {
    content: '';
    position: absolute;
    left: 0; top: 17px;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--p500);
  }

  .kbd {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 6px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.14);
    border-bottom-width: 2px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--s200);
  }
</style>
</head>
<body>
<div class="progress"><div class="progress-bar" id="progressBar"></div></div>
<div class="deck" id="deck"></div>
<div class="nav">
  <button class="nav-btn" onclick="prev()" aria-label="Previous">
    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
  </button>
  <div class="nav-count" id="navCount">01 / 18</div>
  <button class="nav-btn" onclick="next()" aria-label="Next">
    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
  </button>
</div>

<script>
  let current = 0;
  const slides = [];

  function render() {
    const deck = document.getElementById('deck');
    deck.innerHTML = slides.map((s, i) => `<section class="slide ${i===current?'active':''}" data-i="${i}">${s}</section>`).join('');
    document.getElementById('navCount').textContent =
      String(current+1).padStart(2,'0') + ' / ' + String(slides.length).padStart(2,'0');
    document.getElementById('progressBar').style.width = ((current+1)/slides.length*100) + '%';
  }

  function go(i) {
    if (i < 0 || i >= slides.length) return;
    current = i;
    render();
  }
  function next() { go(current+1); }
  function prev() { go(current-1); }

  document.addEventListener('keydown', e => {
    if (['ArrowRight','PageDown',' '].includes(e.key)) { e.preventDefault(); next(); }
    else if (['ArrowLeft','PageUp'].includes(e.key)) { e.preventDefault(); prev(); }
    else if (e.key === 'Home') go(0);
    else if (e.key === 'End') go(slides.length-1);
  });

  // Slide content is injected below
</script>
<script id="slides-content">
// SLIDE 1 - TITLE
slides.push(`
  <div class="glow-orb p" style="top:-200px;left:-200px;"></div>
  <div class="glow-orb a" style="bottom:-250px;right:-150px;"></div>
  <div class="content">
    <div class="logo-badge">
      <svg class="truck" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 18.75a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h6m-9 0H3.375a1.125 1.125 0 01-1.125-1.125V14.25m17.25 4.5a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h1.125c.621 0 1.129-.504 1.09-1.124a17.902 17.902 0 00-3.213-9.193 2.056 2.056 0 00-1.58-.86H14.25M16.5 18.75h-2.25m0-11.177v-.958c0-.568-.422-1.048-.987-1.106a48.554 48.554 0 00-10.026 0 1.106 1.106 0 00-.987 1.106v7.635m12-6.677v6.677m0 4.5v-4.5m0 0h-12"/></svg>
      <span>Open TMS</span>
    </div>
    <div style="flex:1; display:flex; flex-direction:column; justify-content:center; max-width: 1100px;">
      <div class="pill" style="margin-bottom:32px;">
        <span class="dot"></span>
        <span>A field guide to transportation management</span>
      </div>
      <h1 class="title">
        How a TMS <br/>
        <span class="gradient-text">actually works.</span>
      </h1>
      <p class="subtitle lg" style="margin-top:28px;">
        The people, the processes, and the protocols that move freight
        across the world every single day - and how modern software holds it all together.
      </p>
      <div style="display:flex; gap:18px; margin-top:48px; align-items:center;">
        <div class="stat-num gradient-text">18</div>
        <div style="font-size:15px; color:var(--s400); line-height:1.45;">
          slides &middot; use <span class="kbd">&rarr;</span> <span class="kbd">&larr;</span> to navigate,<br/>
          <span class="kbd">Space</span> for next, <span class="kbd">Home</span>/<span class="kbd">End</span> to jump
        </div>
      </div>
    </div>
  </div>
`);

// SLIDE 2 - WHAT IS A TMS
slides.push(`
  <div class="glow-orb p" style="top:10%;right:-200px;"></div>
  <div class="content">
    <div class="pill" style="margin-bottom:20px;">Definition</div>
    <h2 class="section">What is a <span class="gradient-text">TMS</span>?</h2>
    <p class="subtitle" style="margin-top:18px;">
      A Transportation Management System is the operating system for moving goods.
      It plans, executes, tracks and pays for every shipment that leaves a dock
      and every order that lands with a customer.
    </p>

    <div class="grid g3" style="margin-top:48px;">
      <div class="glass">
        <div class="card-icon">

        </div>
        <div class="card-title">Plan</div>
        <div class="card-body">Ingest orders, build shipments, match lanes to carriers, rate the load, and sequence multi-stop routes.</div>
      </div>
      <div class="glass">
        <div class="card-icon a">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6"><path stroke-linecap="round" stroke-linejoin="round" d="M9 6.75V15m6-6v8.25m.503 3.498l4.875-2.437c.381-.19.622-.58.622-1.006V4.82c0-.836-.88-1.38-1.628-1.006l-3.869 1.934c-.317.159-.69.159-1.006 0L9.503 3.252a1.125 1.125 0 00-1.006 0L3.622 5.689C3.24 5.88 3 6.27 3 6.695V19.18c0 .836.88 1.38 1.628 1.006l3.869-1.934c.317-.159.69-.159 1.006 0l4.994 2.497c.317.158.69.158 1.006 0z"/></svg>
        </div>
        <div class="card-title">Execute</div>
        <div class="card-body">Tender to carriers, track GPS and sensors, detect exceptions, and orchestrate warehouses and drivers in real time.</div>
      </div>
      <div class="glass">
        <div class="card-icon g">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 00-.75.75v.75"/></svg>
        </div>
        <div class="card-title">Settle</div>
        <div class="card-body">Invoice customers, audit carrier invoices, resolve disputes, and report on margin, on-time performance and compliance.</div>
      </div>
    </div>

    <div class="grid g4" style="margin-top:32px;">
      <div class="glass sm" style="text-align:center;">
        <div class="stat-num gradient-text">$11T</div>
        <div class="stat-label">Global freight spend / year</div>
      </div>
      <div class="glass sm" style="text-align:center;">
        <div class="stat-num gradient-text">9%</div>
        <div class="stat-label">Of global GDP is logistics</div>
      </div>
      <div class="glass sm" style="text-align:center;">
        <div class="stat-num gradient-text">74M</div>
        <div class="stat-label">Trucks on the road in the US</div>
      </div>
      <div class="glass sm" style="text-align:center;">
        <div class="stat-num gradient-text">10%</div>
        <div class="stat-label">Of spend lost to inefficiency</div>
      </div>
    </div>
  </div>
`);

// SLIDE 3 - THE PROBLEM
slides.push(`
  <div class="glow-orb a" style="top:20%;left:-200px;"></div>
  <div class="content">
    <div class="pill accent" style="margin-bottom:20px;">The problem space</div>
    <h2 class="section">Why a TMS <span class="gradient-text">exists</span>.</h2>
    <p class="subtitle" style="margin-top:18px;">
