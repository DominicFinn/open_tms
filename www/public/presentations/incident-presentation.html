<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>The Incident Manager - Open TMS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --p50:#eff6ff; --p100:#dbeafe; --p200:#bfdbfe; --p300:#93c5fd;
    --p400:#60a5fa; --p500:#3b82f6; --p600:#2563eb; --p700:#1d4ed8;
    --p800:#1e40af; --p900:#1e3a8a; --p950:#172554;
    --a400:#a78bfa; --a500:#8b5cf6; --a600:#7c3aed;
    --s50:#f8fafc; --s100:#f1f5f9; --s200:#e2e8f0; --s300:#cbd5e1;
    --s400:#94a3b8; --s500:#64748b; --s600:#475569; --s700:#334155;
    --s800:#1e293b; --s900:#0f172a; --s950:#020617;
    --green:#22c55e; --yellow:#eab308; --red:#ef4444; --cyan:#06b6d4;
    --amber:#f59e0b; --emerald:#10b981; --pink:#ec4899; --rose:#f43f5e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%; overflow: hidden;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    color: #fff; background: var(--s950);
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: linear-gradient(135deg, var(--s950) 0%, #1a0a1a 50%, var(--s900) 100%);
    z-index: -2;
  }
  body::after {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    opacity: 0.03; z-index: -1; pointer-events: none;
  }

  .deck { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
  .slide {
    position: absolute; inset: 0; padding: 56px 72px;
    display: none; flex-direction: column; opacity: 0;
    transition: opacity .4s ease; overflow: hidden;
  }
  .slide.active { display: flex; opacity: 1; }

  .glow-orb { position: absolute; width: 700px; height: 700px; border-radius: 50%; pointer-events: none; z-index: 0; filter: blur(120px); }
  .glow-orb.r { background: rgba(244, 63, 94, 0.14); }
  .glow-orb.k { background: rgba(236, 72, 153, 0.12); }
  .glow-orb.e { background: rgba(16, 185, 129, 0.10); }

  .content { position: relative; z-index: 1; display: flex; flex-direction: column; height: 100%; }

  .pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 16px; border-radius: 999px;
    border: 1px solid rgba(244, 63, 94, 0.24);
    background: rgba(244, 63, 94, 0.12);
    font-size: 13px; font-weight: 500; color: #fda4af;
    letter-spacing: 0.02em; width: fit-content;
  }
  .pill.pink { border-color: rgba(236, 72, 153, 0.25); background: rgba(236, 72, 153, 0.12); color: #f9a8d4; }
  .pill.emerald { border-color: rgba(16, 185, 129, 0.25); background: rgba(16, 185, 129, 0.12); color: #6ee7b7; }
  .pill.cyan { border-color: rgba(6, 182, 212, 0.25); background: rgba(6, 182, 212, 0.12); color: #67e8f9; }
  .pill .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1; transform:scale(1)}50%{opacity:.3; transform:scale(.8)} }

  h1.title { font-size: 72px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.02; margin: 20px 0 14px; }
  h1.title.small { font-size: 52px; }
  h2.section { font-size: 48px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.08; margin: 16px 0 10px; }
  .subtitle { font-size: 20px; color: var(--s300); line-height: 1.55; max-width: 1020px; font-weight: 400; }
  .subtitle.lg { font-size: 24px; max-width: 1080px; }
  .gradient-text {
    background: linear-gradient(135deg, var(--rose), var(--pink));
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
  }
  .gradient-text.e {
    background: linear-gradient(135deg, var(--emerald), var(--cyan));
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
  }
  .eyebrow { text-transform: uppercase; letter-spacing: 0.15em; font-size: 11px; font-weight: 600; color: #fda4af; }
  .eyebrow.k { color: #f9a8d4; }
  .eyebrow.e { color: #6ee7b7; }
  .eyebrow.c { color: #67e8f9; }

  .glass {
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px; padding: 22px;
  }
  .glass.hl {
    background: linear-gradient(135deg, rgba(244,63,94,0.10), rgba(236,72,153,0.10));
    border-color: rgba(244,63,94,0.22);
  }
  .glass.hl-e {
    background: linear-gradient(135deg, rgba(16,185,129,0.10), rgba(6,182,212,0.10));
    border-color: rgba(16,185,129,0.22);
  }
  .glass.sm { padding: 16px; border-radius: 14px; }

  .row { display: flex; gap: 20px; }
  .grid { display: grid; gap: 16px; }
  .g2 { grid-template-columns: repeat(2, 1fr); }
  .g3 { grid-template-columns: repeat(3, 1fr); }
  .g4 { grid-template-columns: repeat(4, 1fr); }
  .g5 { grid-template-columns: repeat(5, 1fr); }

  .card-title { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
  .card-body { font-size: 13px; color: var(--s300); line-height: 1.55; }
  .card-icon {
    width: 40px; height: 40px; border-radius: 10px;
    background: rgba(244,63,94,0.18); color: #fda4af;
    display: inline-flex; align-items: center; justify-content: center;
    margin-bottom: 10px;
  }
  .card-icon.k { background: rgba(236,72,153,0.18); color: #f9a8d4; }
  .card-icon.e { background: rgba(16,185,129,0.18); color: #6ee7b7; }
  .card-icon.c { background: rgba(6,182,212,0.18); color: #67e8f9; }
  .card-icon.y { background: rgba(234,179,8,0.18); color: #fde047; }
  .card-icon.p { background: rgba(37,99,235,0.18); color: var(--p400); }
  .card-icon.a { background: rgba(139,92,246,0.18); color: var(--a400); }
  .card-icon svg { width: 22px; height: 22px; }

  .stat-num { font-size: 38px; font-weight: 800; letter-spacing: -0.02em; line-height: 1; }
  .stat-label { font-size: 11.5px; color: var(--s400); margin-top: 6px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; }

  .flow { display: flex; gap: 8px; align-items: stretch; }
  .flow-step {
    flex: 1; padding: 16px 12px; border-radius: 12px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    display: flex; flex-direction: column; gap: 6px;
    position: relative;
  }
  .flow-step .step-num { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #fda4af; font-weight: 600; letter-spacing: 0.1em; }
  .flow-step .step-num.e { color: #6ee7b7; }
  .flow-step .step-title { font-size: 13px; font-weight: 600; color: #fff; line-height: 1.3; }
  .flow-step .step-desc { font-size: 10.5px; color: var(--s400); line-height: 1.4; }
  .flow-step::after {
    content: ''; position: absolute; right: -6px; top: 50%;
    width: 12px; height: 12px;
    border-right: 2px solid rgba(255,255,255,0.14);
    border-top: 2px solid rgba(255,255,255,0.14);
    transform: translateY(-50%) rotate(45deg); z-index: 2;
  }
  .flow-step:last-child::after { display: none; }

  .terminal {
    border-radius: 12px; background: var(--s900);
    border: 1px solid rgba(255,255,255,0.06);
    overflow: hidden;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
  }
  .terminal-bar {
    display: flex; align-items: center; gap: 6px;
    padding: 10px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    background: var(--s900);
  }
  .tb-dot { width: 10px; height: 10px; border-radius: 50%; }
  .tb-dot.r { background: rgba(239,68,68,0.6); }
  .tb-dot.y { background: rgba(234,179,8,0.6); }
  .tb-dot.g { background: rgba(34,197,94,0.6); }
  .terminal-title { margin-left: 10px; font-size: 11px; color: var(--s500); }
  .terminal-body { padding: 16px; color: var(--s300); line-height: 1.65; }
  .c-key { color: #fda4af; }
  .c-str { color: #6ee7b7; }
  .c-num { color: #f9a8d4; }
  .c-com { color: var(--s500); }

  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 9px; border-radius: 6px;
    font-size: 11px; font-weight: 500;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.02em;
  }
  .chip.p { background: rgba(37,99,235,0.15); color: var(--p300); border: 1px solid rgba(37,99,235,0.25); }
  .chip.r { background: rgba(239,68,68,0.15); color: #fca5a5; border: 1px solid rgba(239,68,68,0.25); }
  .chip.k { background: rgba(236,72,153,0.15); color: #f9a8d4; border: 1px solid rgba(236,72,153,0.25); }
  .chip.e { background: rgba(16,185,129,0.15); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.25); }
  .chip.c { background: rgba(6,182,212,0.15); color: #67e8f9; border: 1px solid rgba(6,182,212,0.25); }
  .chip.y { background: rgba(234,179,8,0.15); color: #fde047; border: 1px solid rgba(234,179,8,0.25); }
  .chip.a { background: rgba(139,92,246,0.15); color: var(--a400); border: 1px solid rgba(139,92,246,0.25); }
  .chip.g { background: rgba(148,163,184,0.12); color: var(--s300); border: 1px solid rgba(148,163,184,0.2); }

  .nav {
    position: fixed; bottom: 20px; left: 0; right: 0;
    display: flex; align-items: center; justify-content: center;
    gap: 12px; z-index: 100;
  }
  .nav-btn {
    width: 36px; height: 36px; border-radius: 10px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: #fff; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.12); }
  .nav-count {
    font-size: 12.5px; font-family: 'JetBrains Mono', monospace;
    color: var(--s400); min-width: 60px; text-align: center; font-weight: 500;
  }
  .progress {
    position: fixed; top: 0; left: 0; right: 0; height: 3px;
    background: rgba(255,255,255,0.05); z-index: 100;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--rose), var(--pink), var(--emerald));
    transition: width .4s ease;
  }

  .logo-badge {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 8px 16px; border-radius: 12px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    font-size: 14px; font-weight: 600; letter-spacing: -0.01em;
  }
  .logo-badge .icon { color: var(--rose); }

  .footnote {
    position: absolute; bottom: 20px; left: 72px;
    font-size: 11.5px; color: var(--s500); font-weight: 500;
  }

  ul.clean { list-style: none; padding: 0; }
  ul.clean li { padding: 6px 0; padding-left: 22px; position: relative; color: var(--s300); font-size: 13.5px; line-height: 1.45; }
  ul.clean li::before {
    content: ''; position: absolute; left: 0; top: 14px;
    width: 6px; height: 6px; border-radius: 50%; background: var(--rose);
  }
  ul.clean.e li::before { background: var(--emerald); }

  .kbd {
    display: inline-block; padding: 2px 8px;
    border-radius: 6px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.14);
    border-bottom-width: 2px;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    color: var(--s200);
  }

  /* Kanban mockup */
  .kanban { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .kanban-col { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 10px; padding: 12px; min-height: 220px; }
  .kanban-col-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
  .kanban-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 10px; margin-bottom: 8px; font-size: 11px; }
  .kanban-card .k-title { font-weight: 600; color: #fff; margin-bottom: 6px; font-size: 11.5px; line-height: 1.3; }
  .kanban-card .k-meta { color: var(--s500); font-family: 'JetBrains Mono', monospace; font-size: 10px; display: flex; justify-content: space-between; margin-top: 6px; }
</style>
</head>
<body>
<div class="progress"><div class="progress-bar" id="progressBar"></div></div>
<div class="deck" id="deck"></div>
<div class="nav">
  <button class="nav-btn" onclick="prev()" aria-label="Previous">
    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
  </button>
  <div class="nav-count" id="navCount">01 / 17</div>
  <button class="nav-btn" onclick="next()" aria-label="Next">
    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
  </button>
</div>

<script>
  let current = 0;
  const slides = [];
  function render() {
    const deck = document.getElementById('deck');
    deck.innerHTML = slides.map((s, i) => `<section class="slide ${i===current?'active':''}" data-i="${i}">${s}</section>`).join('');
    document.getElementById('navCount').textContent = String(current+1).padStart(2,'0') + ' / ' + String(slides.length).padStart(2,'0');
    document.getElementById('progressBar').style.width = ((current+1)/slides.length*100) + '%';
  }
  function go(i) { if (i < 0 || i >= slides.length) return; current = i; render(); }
  function next() { go(current+1); }
  function prev() { go(current-1); }
  document.addEventListener('keydown', e => {
    if (['ArrowRight','PageDown',' '].includes(e.key)) { e.preventDefault(); next(); }
    else if (['ArrowLeft','PageUp'].includes(e.key)) { e.preventDefault(); prev(); }
    else if (e.key === 'Home') go(0);
    else if (e.key === 'End') go(slides.length-1);
  });
</script>
<script id="slides-content">
// SLIDE 1 - TITLE
slides.push(`
  <div class="glow-orb r" style="top:-200px;left:-200px;"></div>
  <div class="glow-orb k" style="bottom:-250px;right:-150px;"></div>
  <div class="content">
    <div class="logo-badge">
      <svg class="icon" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/></svg>
      <span>Open TMS &middot; Incident Manager</span>
    </div>
    <div style="flex:1; display:flex; flex-direction:column; justify-content:center; max-width:1100px;">
      <div class="pill" style="margin-bottom:26px;">
        <span class="dot"></span>
        <span>From sensor alert to root cause, every time</span>
      </div>
      <h1 class="title">
        When things <br/>
        <span class="gradient-text">go wrong.</span>
      </h1>
      <p class="subtitle lg" style="margin-top:22px;">
        A pickup window slips. A trailer mis-delivers to the wrong dock. Demurrage clocks up while a
        driver waits. A retailer threatens an OTIF penalty. Modern logistics doesn't prevent every
        exception - it turns every exception into a traceable, resolvable, improvable event.
      </p>
      <div style="display:flex; gap:18px; margin-top:40px; align-items:center;">
        <div class="stat-num gradient-text">17</div>
        <div style="font-size:14px; color:var(--s400); line-height:1.45;">
          slides &middot; <span class="kbd">&rarr;</span> <span class="kbd">&larr;</span> to navigate,<br/>
          <span class="kbd">Space</span> for next, <span class="kbd">Home</span>/<span class="kbd">End</span> to jump
        </div>
      </div>
    </div>
  </div>
`);

// SLIDE 2 - WHAT IS AN INCIDENT
slides.push(`
  <div class="glow-orb r" style="top:10%;right:-200px;"></div>
  <div class="content">
    <div class="pill" style="margin-bottom:16px;">Definition</div>
    <h2 class="section">What is an <span class="gradient-text">incident</span>?</h2>
    <p class="subtitle" style="margin-top:14px;">
      An incident is anything that deviates from the plan - and the plan is bigger than sensors.
      A missed pickup window. A mis-delivery to the wrong dock. Demurrage clocking up while a driver waits.
      An OTIF breach that triggers a retailer penalty. If it costs money, breaks trust or breaks compliance,
      the Incident Manager is where it lives.
    </p>

    <div class="grid g3" style="margin-top:32px;">
      <div class="glass">
        <div class="card-icon">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        </div>
        <div class="card-title">Service &amp; commercial</div>
        <div class="card-body">OTIF misses, retailer penalties, demurrage and detention fees, missed pickup windows, chain-of-custody handoff gaps, mis-deliveries to the wrong dock or wrong store.</div>
      </div>
      <div class="glass">
        <div class="card-icon k">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6"><path stroke-linecap="round" stroke-linejoin="round" d="M9.75 3.104v5.714a2.25 2.25 0 01-.659 1.591L5 14.5M9.75 3.104c-.251.023-.501.05-.75.082m.75-.082a24.301 24.301 0 014.5 0m0 0v5.714c0 .597.237 1.17.659 1.591L19.8 15.3"/></svg>
        </div>
        <div class="card-title">Product &amp; quality</div>
        <div class="card-body">Hot product loaded onto a reefer still warming up. Damage from shock or tilt. Seal broken mid-route. Light exposure on photosensitive pharma. Excursions that cross FDA thresholds.</div>
      </div>
      <div class="glass">
        <div class="card-icon y">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6"><path stroke-linecap="round" stroke-linejoin="round" d="M7.5 21L3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5"/></svg>
        </div>
        <div class="card-title">Process &amp; integration</div>
        <div class="card-body">Documentation errors, POD signature missing, dwell time over spec at receiver dock, integration sync failure with the client ERP, painful reverse logistics with no inventory visibility.</div>
      </div>
    </div>

    <div class="glass hl" style="margin-top:24px; display:flex; gap:22px; align-items:center;">
      <div class="card-icon" style="margin:0; width:52px; height:52px; flex-shrink:0;">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6" style="width:26px;height:26px;"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
      </div>
      <div>
        <div class="card-title" style="margin-bottom:4px;">Sensors are the smallest part of the job</div>
        <div class="card-body" style="font-size:14.5px;">
          Temperature excursions get the headlines, but most incidents are schedule slips,
          handoff gaps and integration mismatches - the stuff no single sensor catches.
          The Triage Centre treats an OTIF risk, a detention fee and a broken seal with
          the same discipline: detect, classify, assign, resolve, learn.
        </div>
      </div>
    </div>
  </div>
`);

// SLIDE 3 - THE PROBLEM
slides.push(`
  <div class="glow-orb k" style="bottom:-150px;left:-150px;"></div>
  <div class="content">
    <div class="pill pink" style="margin-bottom:16px;">Why this matters</div>
    <h2 class="section">The <span class="gradient-text">signal-to-noise</span> problem.</h2>
    <p class="subtitle" style="margin-top:14px;">
      A busy operation generates thousands of telemetry events per shipment.
      Most are normal. A handful are catastrophic. Telling them apart is the job.
    </p>

    <div class="grid g2" style="margin-top:32px; gap:22px;">

          <li>A cold chain excursion that caused product quarantine or write-off</li>
          <li>A customer complaint escalated by the quality manager</li>
          <li>A regulatory observation during audit or inspection</li>

          <li>Any deviation meeting the org's CAPA escalation matrix threshold</li>

        <div class="glass hl-e" style="padding:20px;">
          <div style="display:flex; gap:16px; align-items:flex-start; margin-bottom:16px;">
            <div style="width:36px; height:36px; border-radius:9px; background:rgba(244,63,94,0.2); color:#fda4af; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:13px; font-family:JetBrains Mono; flex-shrink:0;">CA</div>
