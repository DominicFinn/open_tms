<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Inside the Warehouse - Open TMS WMS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --p50:#eff6ff; --p100:#dbeafe; --p200:#bfdbfe; --p300:#93c5fd;
    --p400:#60a5fa; --p500:#3b82f6; --p600:#2563eb; --p700:#1d4ed8;
    --p800:#1e40af; --p900:#1e3a8a; --p950:#172554;
    --a400:#a78bfa; --a500:#8b5cf6; --a600:#7c3aed;
    --s50:#f8fafc; --s100:#f1f5f9; --s200:#e2e8f0; --s300:#cbd5e1;
    --s400:#94a3b8; --s500:#64748b; --s600:#475569; --s700:#334155;
    --s800:#1e293b; --s900:#0f172a; --s950:#020617;
    --green:#22c55e; --yellow:#eab308; --red:#ef4444; --cyan:#06b6d4;
    --amber:#f59e0b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%; overflow: hidden;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    color: #fff; background: var(--s950);
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: linear-gradient(135deg, var(--s950) 0%, var(--p950) 50%, var(--s900) 100%);
    z-index: -2;
  }
  body::after {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    opacity: 0.03; z-index: -1; pointer-events: none;
  }

  .deck { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
  .slide {
    position: absolute; inset: 0; padding: 56px 72px;
    display: none; flex-direction: column; opacity: 0;
    transition: opacity .4s ease; overflow: hidden;
  }
  .slide.active { display: flex; opacity: 1; }

  .glow-orb { position: absolute; width: 700px; height: 700px; border-radius: 50%; pointer-events: none; z-index: 0; filter: blur(120px); }
  .glow-orb.p { background: rgba(37, 99, 235, 0.15); }
  .glow-orb.a { background: rgba(139, 92, 246, 0.12); }
  .glow-orb.m { background: rgba(245, 158, 11, 0.08); }

  .content { position: relative; z-index: 1; display: flex; flex-direction: column; height: 100%; }

  .pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 16px; border-radius: 999px;
    border: 1px solid rgba(59, 130, 246, 0.2);
    background: rgba(59, 130, 246, 0.1);
    font-size: 13px; font-weight: 500; color: var(--p300);
    letter-spacing: 0.02em; width: fit-content;
  }
  .pill.accent { border-color: rgba(139, 92, 246, 0.22); background: rgba(139, 92, 246, 0.1); color: var(--a400); }
  .pill.amber { border-color: rgba(245, 158, 11, 0.22); background: rgba(245, 158, 11, 0.10); color: var(--amber); }
  .pill .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }

  h1.title { font-size: 72px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.02; margin: 20px 0 14px; }
  h1.title.small { font-size: 52px; }
  h2.section { font-size: 48px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.08; margin: 16px 0 10px; }
  .subtitle { font-size: 20px; color: var(--s300); line-height: 1.55; max-width: 1020px; font-weight: 400; }
  .subtitle.lg { font-size: 24px; max-width: 1080px; }
  .gradient-text {
    background: linear-gradient(135deg, var(--p500), var(--a500));
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
  }
  .gradient-text.amber {
    background: linear-gradient(135deg, var(--amber), #ec4899);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
  }
  .eyebrow { text-transform: uppercase; letter-spacing: 0.15em; font-size: 11px; font-weight: 600; color: var(--p400); }
  .eyebrow.a { color: var(--a400); }
  .eyebrow.m { color: var(--amber); }

  .glass {
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px; padding: 24px;
  }
  .glass.hl {
    background: linear-gradient(135deg, rgba(37,99,235,0.10), rgba(139,92,246,0.10));
    border-color: rgba(59,130,246,0.22);
  }
  .glass.hl-m {
    background: linear-gradient(135deg, rgba(245,158,11,0.10), rgba(236,72,153,0.10));
    border-color: rgba(245,158,11,0.22);
  }
  .glass.sm { padding: 18px; border-radius: 14px; }

  .row { display: flex; gap: 20px; }
  .grid { display: grid; gap: 18px; }
  .g2 { grid-template-columns: repeat(2, 1fr); }
  .g3 { grid-template-columns: repeat(3, 1fr); }
  .g4 { grid-template-columns: repeat(4, 1fr); }

  .card-title { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
  .card-body { font-size: 13px; color: var(--s300); line-height: 1.55; }
  .card-icon {
    width: 40px; height: 40px; border-radius: 10px;
    background: rgba(37,99,235,0.18); color: var(--p400);
    display: inline-flex; align-items: center; justify-content: center;
    margin-bottom: 12px;
  }
  .card-icon.a { background: rgba(139,92,246,0.18); color: var(--a400); }
  .card-icon.g { background: rgba(34,197,94,0.18); color: var(--green); }
  .card-icon.y { background: rgba(234,179,8,0.18); color: var(--yellow); }
  .card-icon.r { background: rgba(239,68,68,0.18); color: var(--red); }
  .card-icon.c { background: rgba(6,182,212,0.18); color: var(--cyan); }
  .card-icon.m { background: rgba(245,158,11,0.18); color: var(--amber); }
  .card-icon svg { width: 22px; height: 22px; }

  .stat-num { font-size: 40px; font-weight: 800; letter-spacing: -0.02em; line-height: 1; }
  .stat-label { font-size: 12px; color: var(--s400); margin-top: 6px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; }

  /* Flow steps */
  .flow { display: flex; gap: 8px; align-items: stretch; }
  .flow-step {
    flex: 1; padding: 18px 14px; border-radius: 12px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    display: flex; flex-direction: column; gap: 6px;
    position: relative;
  }
  .flow-step .step-num { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--p400); font-weight: 600; letter-spacing: 0.1em; }
  .flow-step .step-title { font-size: 13px; font-weight: 600; color: #fff; line-height: 1.3; }
  .flow-step .step-desc { font-size: 11px; color: var(--s400); line-height: 1.4; }
  .flow-step::after {
    content: ''; position: absolute; right: -6px; top: 50%;
    width: 12px; height: 12px;
    border-right: 2px solid rgba(255,255,255,0.14);
    border-top: 2px solid rgba(255,255,255,0.14);
    transform: translateY(-50%) rotate(45deg); z-index: 2;
  }
  .flow-step:last-child::after { display: none; }

  /* Terminal */
  .terminal {
    border-radius: 12px; background: var(--s900);
    border: 1px solid rgba(255,255,255,0.06);
    overflow: hidden;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
  }
  .terminal-bar {
    display: flex; align-items: center; gap: 6px;
    padding: 10px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    background: var(--s900);
  }
  .tb-dot { width: 10px; height: 10px; border-radius: 50%; }
  .tb-dot.r { background: rgba(239,68,68,0.6); }
  .tb-dot.y { background: rgba(234,179,8,0.6); }
  .tb-dot.g { background: rgba(34,197,94,0.6); }
  .terminal-title { margin-left: 10px; font-size: 11px; color: var(--s500); }
  .terminal-body { padding: 18px; color: var(--s300); line-height: 1.65; }
  .c-key { color: var(--p400); }
  .c-str { color: #6ee7b7; }
  .c-num { color: var(--a400); }
  .c-com { color: var(--s500); }

  /* Chips */
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 9px; border-radius: 6px;
    font-size: 11px; font-weight: 500;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.02em;
  }
  .chip.p { background: rgba(37,99,235,0.15); color: var(--p300); border: 1px solid rgba(37,99,235,0.25); }
  .chip.a { background: rgba(139,92,246,0.15); color: var(--a400); border: 1px solid rgba(139,92,246,0.25); }
  .chip.g { background: rgba(34,197,94,0.15); color: #86efac; border: 1px solid rgba(34,197,94,0.25); }
  .chip.y { background: rgba(234,179,8,0.15); color: #fde047; border: 1px solid rgba(234,179,8,0.25); }
  .chip.r { background: rgba(239,68,68,0.15); color: #fca5a5; border: 1px solid rgba(239,68,68,0.25); }
  .chip.m { background: rgba(245,158,11,0.15); color: #fcd34d; border: 1px solid rgba(245,158,11,0.25); }

  .nav {
    position: fixed; bottom: 20px; left: 0; right: 0;
    display: flex; align-items: center; justify-content: center;
    gap: 12px; z-index: 100;
  }
  .nav-btn {
    width: 36px; height: 36px; border-radius: 10px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: #fff; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.12); }
  .nav-count {
    font-size: 12.5px; font-family: 'JetBrains Mono', monospace;
    color: var(--s400); min-width: 60px; text-align: center; font-weight: 500;
  }
  .progress {
    position: fixed; top: 0; left: 0; right: 0; height: 3px;
    background: rgba(255,255,255,0.05); z-index: 100;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--amber), var(--a500), var(--p500));
    transition: width .4s ease;
  }

  .logo-badge {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 8px 16px; border-radius: 12px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    font-size: 14px; font-weight: 600; letter-spacing: -0.01em;
  }
  .logo-badge .truck { color: var(--amber); }

  .footnote {
    position: absolute; bottom: 20px; left: 72px;
    font-size: 11.5px; color: var(--s500); font-weight: 500;
  }

  .node {
    padding: 12px 16px; border-radius: 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    font-size: 12.5px; font-weight: 600; text-align: center;
  }
  .node.p { background: rgba(37,99,235,0.14); border-color: rgba(37,99,235,0.3); color: var(--p300); }
  .node.a { background: rgba(139,92,246,0.14); border-color: rgba(139,92,246,0.3); color: var(--a400); }
  .node.g { background: rgba(34,197,94,0.14); border-color: rgba(34,197,94,0.3); color: #86efac; }
  .node.m { background: rgba(245,158,11,0.14); border-color: rgba(245,158,11,0.3); color: #fcd34d; }

  ul.clean { list-style: none; padding: 0; }
  ul.clean li { padding: 6px 0; padding-left: 22px; position: relative; color: var(--s300); font-size: 14px; line-height: 1.45; }
  ul.clean li::before {
    content: ''; position: absolute; left: 0; top: 14px;
    width: 6px; height: 6px; border-radius: 50%; background: var(--amber);
  }

  .kbd {
    display: inline-block; padding: 2px 8px;
    border-radius: 6px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.14);
    border-bottom-width: 2px;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    color: var(--s200);
  }

  /* Bin grid visualisation */
  .bin-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; }
  .bin {
    aspect-ratio: 1;
    border-radius: 4px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--s500);
    position: relative;
  }
  .bin.empty { background: rgba(255,255,255,0.02); }
  .bin.low { background: rgba(34,197,94,0.15); border-color: rgba(34,197,94,0.35); color: #86efac; }
  .bin.med { background: rgba(234,179,8,0.15); border-color: rgba(234,179,8,0.35); color: #fde047; }
  .bin.high { background: rgba(245,158,11,0.25); border-color: rgba(245,158,11,0.5); color: #fcd34d; }
  .bin.full { background: rgba(239,68,68,0.25); border-color: rgba(239,68,68,0.5); color: #fca5a5; }
</style>
</head>
<body>
<div class="progress"><div class="progress-bar" id="progressBar"></div></div>
<div class="deck" id="deck"></div>
<div class="nav">
  <button class="nav-btn" onclick="prev()" aria-label="Previous">
    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
  </button>
  <div class="nav-count" id="navCount">01 / 17</div>
  <button class="nav-btn" onclick="next()" aria-label="Next">
    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
  </button>
</div>

<script>
  let current = 0;
  const slides = [];
  function render() {
    const deck = document.getElementById('deck');
    deck.innerHTML = slides.map((s, i) => `<section class="slide ${i===current?'active':''}" data-i="${i}">${s}</section>`).join('');
    document.getElementById('navCount').textContent = String(current+1).padStart(2,'0') + ' / ' + String(slides.length).padStart(2,'0');
    document.getElementById('progressBar').style.width = ((current+1)/slides.length*100) + '%';
  }
  function go(i) { if (i < 0 || i >= slides.length) return; current = i; render(); }
  function next() { go(current+1); }
  function prev() { go(current-1); }
  document.addEventListener('keydown', e => {
    if (['ArrowRight','PageDown',' '].includes(e.key)) { e.preventDefault(); next(); }
    else if (['ArrowLeft','PageUp'].includes(e.key)) { e.preventDefault(); prev(); }
    else if (e.key === 'Home') go(0);
    else if (e.key === 'End') go(slides.length-1);
  });
</script>
<script id="slides-content">
// SLIDE 1 - TITLE
slides.push(`
  <div class="glow-orb m" style="top:-200px;left:-200px;"></div>
  <div class="glow-orb a" style="bottom:-250px;right:-150px;"></div>
  <div class="content">
    <div class="logo-badge">
      <svg class="truck" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M20.25 7.5l-.625 10.632a2.25 2.25 0 01-2.247 2.118H6.622a2.25 2.25 0 01-2.247-2.118L3.75 7.5M10 11.25h4M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125z"/></svg>
      <span>Open TMS &middot; WMS</span>
    </div>
    <div style="flex:1; display:flex; flex-direction:column; justify-content:center; max-width:1100px;">
      <div class="pill amber" style="margin-bottom:28px;">
        <span class="dot"></span>
        <span>A field guide to the modern warehouse</span>
      </div>
      <h1 class="title">
        Inside the <br/>
        <span class="gradient-text amber">warehouse.</span>
      </h1>
      <p class="subtitle lg" style="margin-top:24px;">
        From a truck backing onto a dock to a package leaving on a van -
        how a Warehouse Management System orchestrates every pallet,
        every pick and every scan in between.
      </p>
      <div style="display:flex; gap:18px; margin-top:40px; align-items:center;">
        <div class="stat-num gradient-text amber">17</div>
        <div style="font-size:14px; color:var(--s400); line-height:1.45;">
          slides &middot; <span class="kbd">&rarr;</span> <span class="kbd">&larr;</span> to navigate,<br/>
          <span class="kbd">Space</span> for next, <span class="kbd">Home</span>/<span class="kbd">End</span> to jump
        </div>
      </div>
    </div>
  </div>
`);

// SLIDE 2 - WHAT IS A WMS
slides.push(`
  <div class="glow-orb m" style="top:10%;right:-200px;"></div>
  <div class="content">
    <div class="pill amber" style="margin-bottom:16px;">Definition</div>
    <h2 class="section">What is a <span class="gradient-text amber">WMS</span>?</h2>
    <p class="subtitle" style="margin-top:14px;">
      If the TMS knows a shipment "arrived at the warehouse" and "left the warehouse",
      the WMS knows everything that happened in between - down to the bin,
      the pallet, the box and the barcode.
    </p>

    <div class="grid g4" style="margin-top:36px;">
      <div class="glass">
        <div class="card-icon m">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6"><path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z"/></svg>
        </div>
        <div class="card-title">Receive</div>
        <div class="card-body">Trucks arrive. Goods come off. Pallets get scanned against an ASN. Discrepancies get logged.</div>
      </div>
      <div class="glass">
        <div class="card-icon">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6"><path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z"/></svg>
        </div>
        <div class="card-title">Store</div>
        <div class="card-body">Every pallet has a home. Putaway rules decide where. FIFO, FEFO and LIFO decide who picks from it next.</div>
      </div>
      <div class="glass">
        <div class="card-icon a">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        </div>
        <div class="card-title">Fulfil</div>
        <div class="card-body">Orders become waves, waves become picks, picks become packs. Cutoffs get hit or missed.</div>
      </div>
      <div class="glass">
        <div class="card-icon g">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 18.75a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h6m-9 0H3.375a1.125 1.125 0 01-1.125-1.125V14.25m17.25 4.5a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0"/></svg>
        </div>
        <div class="card-title">Ship</div>
        <div class="card-body">Cartons stage by carrier. Trailers load last-drop-first. BOL prints. The TMS takes over.</div>
      </div>
    </div>

    <div class="glass hl-m" style="margin-top:28px; display:flex; gap:24px; align-items:center;">
