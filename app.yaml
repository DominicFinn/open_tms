spec:
  name: open-tms
  region: nyc

  databases:
    - engine: PG
      name: db
      num_nodes: 1
      size: db-s-dev-database
      version: "16"

  services:
    - name: backend
      dockerfile_path: backend/Dockerfile
      source_dir: backend
      http_port: 3001
      instance_count: 1
      instance_size_slug: basic-xxs
      health_check:
        http_path: /health
        initial_delay_seconds: 30
        period_seconds: 10
      envs:
        - key: DATABASE_URL
          scope: RUN_TIME
          value: ${db.DATABASE_URL}
        - key: NODE_ENV
          scope: RUN_TIME
          value: production
        - key: PORT
          scope: RUN_TIME
          value: "3001"
        - key: JWT_SECRET
          scope: RUN_TIME
          type: SECRET
          value: CHANGE_ME_GENERATE_A_RANDOM_SECRET
        - key: CORS_ORIGIN
          scope: RUN_TIME
          value: ${APP_URL}

    - name: frontend
      dockerfile_path: frontend/Dockerfile
      source_dir: frontend
      http_port: 80
      instance_count: 1
      instance_size_slug: basic-xxs
      envs:
        - key: VITE_API_URL
          scope: RUN_TIME
          value: ${backend.PUBLIC_URL}
